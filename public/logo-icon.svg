<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4c8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d7000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#iconGradient)" opacity="0.1"/>
  
  <!-- Main icon - stylized "F" with fitness elements -->
  <g transform="translate(8, 8)">
    <!-- Vertical bar of F -->
    <rect x="0" y="0" width="3" height="24" rx="1.5" fill="url(#iconGradient)"/>
    
    <!-- Top horizontal bar of F -->
    <rect x="0" y="0" width="16" height="3" rx="1.5" fill="url(#iconGradient)"/>
    
    <!-- Middle horizontal bar of F -->
    <rect x="0" y="10" width="12" height="3" rx="1.5" fill="url(#iconGradient)"/>
    
    <!-- Fitness accent - small dumbbell -->
    <g transform="translate(18, 6)">
      <rect x="0" y="5" width="6" height="2" rx="1" fill="url(#iconGradient)"/>
      <circle cx="1.5" cy="6" r="1.5" fill="url(#iconGradient)"/>
      <circle cx="4.5" cy="6" r="1.5" fill="url(#iconGradient)"/>
    </g>
    
    <!-- Health accent - leaf -->
    <g transform="translate(18, 14)">
      <path d="M1.5,0 Q3,1.5 1.5,3 Q0,1.5 1.5,0" fill="url(#iconGradient)" opacity="0.8"/>
      <line x1="1.5" y1="3" x2="1.5" y2="4.5" stroke="url(#iconGradient)" stroke-width="1" opacity="0.8"/>
    </g>
  </g>
</svg>
