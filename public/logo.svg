<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5ba600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c8c00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ba600;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4c8c00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d7000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for icon -->
  <circle cx="30" cy="30" r="25" fill="url(#iconGradient)" opacity="0.1"/>
  
  <!-- Main icon - stylized "F" with fitness elements -->
  <g transform="translate(15, 15)">
    <!-- Vertical bar of F -->
    <rect x="0" y="0" width="4" height="30" rx="2" fill="url(#iconGradient)"/>
    
    <!-- Top horizontal bar of F -->
    <rect x="0" y="0" width="20" height="4" rx="2" fill="url(#iconGradient)"/>
    
    <!-- Middle horizontal bar of F -->
    <rect x="0" y="13" width="15" height="4" rx="2" fill="url(#iconGradient)"/>
    
    <!-- Fitness accent - small dumbbell -->
    <g transform="translate(22, 8)">
      <rect x="0" y="6" width="8" height="2" rx="1" fill="url(#iconGradient)"/>
      <circle cx="2" cy="7" r="2" fill="url(#iconGradient)"/>
      <circle cx="6" cy="7" r="2" fill="url(#iconGradient)"/>
    </g>
    
    <!-- Health accent - leaf -->
    <g transform="translate(22, 18)">
      <path d="M2,0 Q4,2 2,4 Q0,2 2,0" fill="url(#iconGradient)" opacity="0.8"/>
      <line x1="2" y1="4" x2="2" y2="6" stroke="url(#iconGradient)" stroke-width="1" opacity="0.8"/>
    </g>
  </g>
  
  <!-- Company name -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="url(#logoGradient)">
    FitZone
  </text>
  
  <!-- Tagline -->
  <text x="70" y="42" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#666" opacity="0.8">
    HEALTH & FITNESS
  </text>
</svg>
